name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i -E "s/(\* Version:\s+)[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?/\1${VERSION}/" appinio-search.php
          sed -i -E "s/(Stable tag:\s+)[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?/\1${VERSION}/" readme.txt
          if ! git diff --quiet; then
            git config user.email "ci@app-in.io"
            git config user.name "ci"
            git commit -am "ci: set version $VERSION"
          fi

      - name: Build zip
        id: build_zip
        # Export the clean tree via `git archive` (respects .gitattributes export-ignore — no
        # .git/tests/vendor/.po/.mo). We do NOT bundle compiled `.mo`: WordPress.org forbids
        # shipping translations and delivers them via translate.wordpress.org language packs.
        # Only the `.pot` template ships (source `.po`/`.mo` are excluded).
        run: |
          rm -rf build && mkdir -p build
          git archive --prefix=appinio-search/ HEAD | tar -x -C build
          rm -f appinio-search.zip
          (cd build && zip -qr ../appinio-search.zip appinio-search)

      - name: Upload to release
        id: upload_release
        run: gh release upload "$GITHUB_REF_NAME" appinio-search.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to R2
        id: upload_r2
        # Served publicly at https://cdn.app-in.io/plugins/appinio-search.zip (stable "latest" path).
        # Short max-age so the stable URL refreshes within minutes of a release — no CDN purge needed.
        run: |
          aws s3 cp appinio-search.zip "s3://${R2_BUCKET}/plugins/appinio-search.zip" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/zip \
            --cache-control "public, max-age=300"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}

      - name: Prepare Slack payload
        id: slack_prep
        if: always()
        run: |
          TAG="${{ github.event.release.tag_name }}"
          STATUS="${{ job.status }}"

          FAILED_STEP=""
          if [ "${{ steps.build_zip.outcome }}" = "failure" ]; then
            FAILED_STEP="Build zip"
          elif [ "${{ steps.upload_release.outcome }}" = "failure" ]; then
            FAILED_STEP="Upload to release"
          elif [ "${{ steps.upload_r2.outcome }}" = "failure" ]; then
            FAILED_STEP="Upload to R2"
          fi

          BODY=$(cat <<'BODY_EOF'
          ${{ github.event.release.body }}
          BODY_EOF
          )
          if [ ${#BODY} -gt 2800 ]; then
            BODY="${BODY:0:2800}..."
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "failed_step=$FAILED_STEP" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v3.0.5
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-templated: true
          # JSON payload with toJSON() for the release body so quotes / colons /
          # newlines in the notes can't break the parser (the old raw-YAML payload did).
          payload: |
            {
              "text": "${{ steps.slack_prep.outputs.status == 'success' && '✅' || '❌' }} AppIn Search ${{ steps.slack_prep.outputs.tag }} — ${{ steps.slack_prep.outputs.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ steps.slack_prep.outputs.status == 'success' && '✅' || '❌' }} ${{ steps.slack_prep.outputs.tag }} ${{ steps.slack_prep.outputs.status == 'success' && 'released' || 'release failed' }}",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ steps.slack_prep.outputs.status == 'success' && toJSON(steps.slack_prep.outputs.body) || toJSON(format('*Failed at:* {0}', steps.slack_prep.outputs.failed_step)) }}
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "`AppIn Search` · ${{ github.repository }}"
                    }
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.slack_prep.outputs.status == 'success' && 'View Release' || 'View Run' }}"
                      },
                      "url": "${{ steps.slack_prep.outputs.status == 'success' && github.event.release.html_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }}",
                      "action_id": "view_link"
                    }
                  ]
                }
              ]
            }
