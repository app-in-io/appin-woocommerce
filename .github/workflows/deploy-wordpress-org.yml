name: Deploy to WordPress.org

# Runs alongside release.yml on every published release: wordpress.org gets the SVN
# deploy, GitHub Releases + R2 keep serving the zip (cdn.app-in.io/plugins/appinio-search.zip).
# The dispatch trigger stays for re-runs and for dry runs against an existing tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build trunk and diff it against SVN without committing'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # On `release` GITHUB_REF_NAME is always the tag, but a dispatch can target any
          # ref — a branch name if it was not a tag. Anchored at both ends: without the
          # trailing `$` a ref like `1.2.3-wip-branch` would slip through and get sed'd
          # into the published Version: / Stable tag.
          if ! printf '%s' "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::Dispatch this workflow from a version tag (vX.Y.Z). Got ref '${GITHUB_REF_NAME}'."
            exit 1
          fi
          # `\* Version:` — same anchor release.yml uses, so both build paths patch the
          # identical line and the pattern cannot drift onto another header field.
          sed -i -E "s/(\* Version:\s+)[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?/\1${VERSION}/" appinio-search.php
          sed -i -E "s/(Stable tag:\s+)[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?/\1${VERSION}/" readme.txt

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          # `|| false` is not cosmetic. The `release` event carries no inputs, so
          # `inputs.dry_run` renders as an empty string — and the action would pass that
          # straight through to deploy.sh's `if $INPUT_DRY_RUN; then`, which expands to
          # `if ; then`: a bash syntax error, on every real release. The action's own
          # `default: false` does not save us — defaults apply only to inputs that are
          # not supplied at all, and `with:` supplies this one.
          dry-run: ${{ inputs.dry_run || false }}
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_PASSWORD }}
          SLUG: appinio-search
          ASSETS_DIR: .wordpress-org
