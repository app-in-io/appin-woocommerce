name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2', '8.3', '8.4']

    name: PHP ${{ matrix.php }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Static analysis
        run: composer analyse

      - name: Run tests
        run: vendor/bin/phpunit

  # The same checks the WordPress.org directory runs on submission. The sibling
  # appin-chat plugin was pended twice by a human reviewer for things a machine
  # could have caught; this job is so that does not happen to this plugin.
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # Check the artifact users actually receive, not the raw checkout. `git archive`
      # applies .gitattributes export-ignore, so dist/ contains exactly what the release
      # zip contains — no .git, no tests/, no vendor/, no dev configs. Checking the
      # checkout instead would scan files that never ship.
      - name: Build the distribution tree
        run: |
          mkdir -p dist/appinio-search
          git archive HEAD | tar x --directory=dist/appinio-search
          find dist -type f | sort

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./dist/appinio-search

  # Translations: `.po` (+ `.pot`) are source and committed; `.mo` are build artifacts compiled
  # during release/deploy packaging (release.yml, deploy-wordpress-org.yml) and never committed.
  # Bundled `.mo` ship as a fallback — community locales arrive via translate.wordpress.org
  # language packs, which take priority since WP 4.6. This job keeps the source honest and the
  # build reproducible.
  i18n:
    name: Translations (PO valid, MO built, none committed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: No compiled .mo committed
        run: |
          if git ls-files 'languages/*.mo' | grep -q .; then
            echo "::error::languages/*.mo are build artifacts and must not be committed — remove with: git rm languages/*.mo"
            git ls-files 'languages/*.mo'
            exit 1
          fi

      - name: Validate and build translations
        # Same script the release/deploy pipelines use — validates every .po (msgfmt -c) and
        # proves the build is reproducible. Output is throwaway (/tmp).
        run: bash .github/scripts/compile-translations.sh /tmp/mo-check
