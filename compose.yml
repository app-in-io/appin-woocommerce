services:
  wordpress:
    image: wordpress:latest
    labels:
      - dev.orbstack.domains=woo.app-in.local
      - dev.orbstack.http-port=80
    volumes:
      - wordpress:/var/www/html
      - .:/var/www/html/wp-content/plugins/appin-search
      - ../appin-chat:/var/www/html/wp-content/plugins/appin-chat
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: secret
      WORDPRESS_CONFIG_EXTRA: |
        define('APPIN_API_URL', 'http://api.app-in.local/v1');
        define('APPIN_CDN_URL', 'http://localhost:5174/src/search/loader.ts');
        define('APPIN_CHAT_CDN_URL', 'http://localhost:5174/src/chat/loader.ts');
    depends_on:
      wordpress-db:
        condition: service_healthy
    networks:
      - search-network
      - internal

  wp-cli:
    image: wordpress:cli
    user: "0:0"
    volumes:
      - wordpress:/var/www/html
      - .:/var/www/html/wp-content/plugins/appin-search
      - ../appin-chat:/var/www/html/wp-content/plugins/appin-chat
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: secret
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - internal
    profiles:
      - setup

  wordpress-db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: secret
      MARIADB_ROOT_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

volumes:
  wordpress:
  db-data:

networks:
  search-network:
    external: true
  internal:
